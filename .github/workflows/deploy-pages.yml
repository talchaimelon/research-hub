name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Seed and export
        run: python3 scripts/seed_and_export.py
      - name: Prepare password gate
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          SITE_SALT: ${{ secrets.SITE_SALT }}
        run: python3 scripts/prepare_gate.py
      - name: Build site
        run: python3 scripts/build_site.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src
      - name: Deploy
        uses: actions/deploy-pages@v4
